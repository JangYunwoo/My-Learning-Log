<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card</title>

<style>
* {
  box-sizing: border-box;
}

.card {
  width: 350px;
  border: 2px solid black;
  padding: 15px;
}

.img-wrapper {
  position: relative;
  width: 100%;
}

.ig {
  width: 100%;
  display: block;
}

.name {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  margin: 0;
  background: rgba(255,180,120,0.85);
  text-align: center;
  padding: 5px 0;
  font-weight: bold;
  font-size: 30px;
}
</style>
</head>

<body>
  <div class="card">
    <div class="img-wrapper">
      <img src="profile.jpg" alt="Profile Image" class="ig">
      <p class="name">Name</p>
    </div>

    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit.Adipisci unde officiis ad nostrum. Laboriosam mollitia similique provident fuga tenetur saepe sit, amet eaque neque eius quaerat expedita ea illum veniam.
    </p>
  </div>
</body>
</html>
